<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password — LOOP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toast" id="toast"><span class="dot"></span><span id="toast-text">Done</span></div>

<div class="auth-layout">
  <aside class="auth-brand">
    <div class="auth-brand-top">
      <a href="index.html" class="logo"><span class="logo-mark"></span><span class="brand-word">LOOP</span></a>
    </div>
    <div class="auth-brand-copy">
      <h2>We'll get you back to your dashboard.</h2>
      <p>Reset links expire in 30 minutes for your workspace's security.</p>
    </div>
    <div class="auth-brand-feed">
      <div class="feed-mask" style="height:100%;">
        <div class="feed-track" id="forgot-feed"></div>
      </div>
    </div>
  </aside>

  <div class="auth-form-side">
    <a class="auth-back" href="login.html">&larr; Back to sign in</a>
    <div class="auth-card">
      <h1>Reset your password</h1>
      <p class="sub">Enter your work email and we'll send a reset link.</p>

      <form id="form-forgot" onsubmit="return handleSubmit(event,'forgot')">
        <div class="field">
          <label for="forgot-email">Work email</label>
          <input class="input" type="email" id="forgot-email" placeholder="you@company.com" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="btn-forgot">
          <span class="spinner"></span><span class="btn-label">Send reset link</span>
        </button>
      </form>

      <div class="switcher">Remembered it? <a href="login.html">Sign in</a></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
