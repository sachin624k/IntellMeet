<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — LOOP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toast" id="toast"><span class="dot"></span><span id="toast-text">Done</span></div>

<div class="auth-layout">
  <aside class="auth-brand">
    <div class="auth-brand-top">
      <a href="index.html" class="logo"><span class="logo-mark"></span><span class="brand-word">LOOP</span></a>
    </div>
    <div class="auth-brand-copy">
      <h2>Every ticket, review, and survey — read the moment it arrives.</h2>
      <p>Sign in to see what's spiking across your workspace this week.</p>
    </div>
    <div class="auth-brand-feed">
      <div class="feed-mask" style="height:100%;">
        <div class="feed-track" id="login-feed"></div>
      </div>
    </div>
  </aside>

  <div class="auth-form-side">
    <a class="auth-back" href="index.html">&larr; Back to LOOP</a>
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to your workspace.</p>

      <form id="form-login" onsubmit="return handleSubmit(event,'login')">
        <div class="field">
          <label for="login-email">Work email</label>
          <input class="input" type="email" id="login-email" placeholder="you@company.com" required>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input class="input" type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <div class="form-foot">
          <label style="display:flex;align-items:center;gap:7px;color:var(--dim-on-paper);">
            <input type="checkbox" style="accent-color:var(--violet);"> Stay signed in
          </label>
          <a href="forgot-password.html">Forgot password?</a>
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="btn-login">
          <span class="spinner"></span><span class="btn-label">Sign in</span>
        </button>
      </form>

      <div class="switcher">New to LOOP? <a href="register.html">Create a workspace</a></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
